  <text x="112" y="288" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">AWS에서 고가용성과 복구 전략을 동시에 만족하려면</text>
  <text x="112" y="330" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">어떤 구성 조합이 가장 적절한가?</text>
  <text x="112" y="360" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="20">긴 문제도 문단 간격과 줄간격을 살려 읽기 쉽게 정리된 카드 레이아웃</text>
