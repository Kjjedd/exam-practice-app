<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .frame { opacity: 0; animation: cycle 12s infinite; }
    .frame-1 { animation-delay: 0s; }
    .frame-2 { animation-delay: 4s; }
    .frame-3 { animation-delay: 8s; }
    @keyframes cycle {
      0% { opacity: 0; }
      6% { opacity: 1; }
      27% { opacity: 1; }
      33% { opacity: 0; }
      100% { opacity: 0; }
    }
    text { font-family: Arial, Helvetica, sans-serif; }
  </style>
  <rect width="1200" height="720" rx="36" fill="#F4F7FB"/>
  <g class="frame frame-1">
    <rect x="60" y="60" width="1080" height="600" rx="36" fill="white" stroke="#E5ECF5" stroke-width="2"/>
    <text x="110" y="128" fill="#1D4ED8" font-size="18" font-weight="700">STEP 1</text>
    <text x="110" y="198" fill="#0F172A" font-size="54" font-weight="700">문제 세트 선택과 범위 지정</text>
    <text x="110" y="248" fill="#64748B" font-size="24">활성 세트를 고르고, 원하는 번호 구간만 바로 학습 시작</text>
    <rect x="110" y="304" width="400" height="180" rx="28" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2"/>
    <rect x="540" y="304" width="480" height="180" rx="28" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="146" y="362" fill="#C2410C" font-size="18" font-weight="700">ACTIVE SET</text>
    <text x="146" y="420" fill="#0F172A" font-size="34" font-weight="700">AWS SAA 전체 세트</text>
    <text x="146" y="456" fill="#64748B" font-size="20">1 ~ 142 범위를 지정하고 시작</text>
    <text x="576" y="362" fill="#2563EB" font-size="18" font-weight="700">MODES</text>
    <text x="576" y="420" fill="#0F172A" font-size="34" font-weight="700">일반 · 랜덤 · 시험</text>
    <text x="576" y="456" fill="#64748B" font-size="20">같은 범위를 모드별로 다르게 풀이</text>
  </g>
  <g class="frame frame-2">
    <rect x="60" y="60" width="1080" height="600" rx="36" fill="white" stroke="#E5ECF5" stroke-width="2"/>
    <text x="110" y="128" fill="#0F766E" font-size="18" font-weight="700">STEP 2</text>
    <text x="110" y="198" fill="#0F172A" font-size="54" font-weight="700">풀이와 즉시 피드백</text>
    <text x="110" y="248" fill="#64748B" font-size="24">일반/랜덤 모드에서는 즉시 하이라이트, 시험 모드에서는 답안만 저장</text>
    <rect x="110" y="308" width="920" height="112" rx="28" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <text x="150" y="370" fill="#0F172A" font-size="32" font-weight="700">Which architecture best balances durability and recovery?</text>
    <rect x="110" y="456" width="430" height="104" rx="24" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
    <rect x="600" y="456" width="430" height="104" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
    <text x="148" y="516" fill="#B91C1C" font-size="24" font-weight="700">사용자가 고른 오답</text>
    <text x="638" y="516" fill="#047857" font-size="24" font-weight="700">실제 정답 보기</text>
  </g>
  <g class="frame frame-3">
    <rect x="60" y="60" width="1080" height="600" rx="36" fill="white" stroke="#E5ECF5" stroke-width="2"/>
    <text x="110" y="128" fill="#EA580C" font-size="18" font-weight="700">STEP 3</text>
    <text x="110" y="198" fill="#0F172A" font-size="54" font-weight="700">결과 요약과 오답 복습</text>
    <text x="110" y="248" fill="#64748B" font-size="24">세트별 오답을 남기고, 남은 문제만 다시 이어서 복습</text>
    <rect x="110" y="304" width="220" height="132" rx="24" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="356" y="304" width="220" height="132" rx="24" fill="#ECFDF5" stroke="#86EFAC" stroke-width="2"/>
    <rect x="602" y="304" width="220" height="132" rx="24" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
    <text x="142" y="352" fill="#64748B" font-size="16" font-weight="700">ANSWERED</text>
    <text x="142" y="406" fill="#0F172A" font-size="44" font-weight="700">30</text>
    <text x="388" y="352" fill="#047857" font-size="16" font-weight="700">CORRECT</text>
    <text x="388" y="406" fill="#0F172A" font-size="44" font-weight="700">25</text>
    <text x="634" y="352" fill="#B91C1C" font-size="16" font-weight="700">WRONG</text>
    <text x="634" y="406" fill="#0F172A" font-size="44" font-weight="700">5</text>
    <rect x="110" y="482" width="920" height="116" rx="26" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
    <text x="146" y="534" fill="#2563EB" font-size="18" font-weight="700">REVIEW LOOP</text>
    <text x="146" y="578" fill="#0F172A" font-size="32" font-weight="700">남은 오답만 다시 묶어 2차 복습 세션으로 이어집니다.</text>
  </g>
</svg>
